name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-client-lite:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            auto-roco-client-lite.spec
            client_main.py
            config.py
            core/
            modes/
            templates/
            web/
            pyproject.toml
            README.md
            CHANGELOG.md

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install core dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build
        run: pyinstaller auto-roco-client-lite.spec

      - name: Copy docs
        run: |
          copy README.md dist\auto-roco-client-lite\
          copy CHANGELOG.md dist\auto-roco-client-lite\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-roco-client-lite
          path: dist/auto-roco-client-lite/

  build-client-full:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            auto-roco-client-full.spec
            client_main.py
            config.py
            core/
            modes/
            templates/
            web/
            pyproject.toml
            README.md
            CHANGELOG.md

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install all dependencies (with EasyOCR)
        run: uv sync --extra easyocr

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build
        run: pyinstaller auto-roco-client-full.spec

      - name: Copy docs
        run: |
          copy README.md dist\auto-roco-client-full\
          copy CHANGELOG.md dist\auto-roco-client-full\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-roco-client-full
          path: dist/auto-roco-client-full/

  release:
    needs: [build-client-lite, build-client-full]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download lite
        uses: actions/download-artifact@v4
        with:
          name: auto-roco-client-lite
          path: auto-roco-client-lite/

      - name: Download full
        uses: actions/download-artifact@v4
        with:
          name: auto-roco-client-full
          path: auto-roco-client-full/

      - name: Zip
        run: |
          cd auto-roco-client-lite && zip -r ../auto-roco-client-lite.zip .
          cd ../auto-roco-client-full && zip -r ../auto-roco-client-full.zip .

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            --title "Auto-Roco $tag" \
            --generate-notes \
            auto-roco-client-lite.zip \
            auto-roco-client-full.zip
